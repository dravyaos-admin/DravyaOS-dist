name: Feature request
description: Suggest a new feature or an improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What are you trying to do?
      description: Describe the problem or the task this would help with. What's slow or missing today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: What would you like to see?
      description: Your idea for how it could work. Rough is fine.
    validations:
      required: false
