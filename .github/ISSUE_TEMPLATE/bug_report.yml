name: Bug report
description: Something in DravyaOS isn't working the way it should
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What went wrong, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: What were you doing when it happened? List the steps if you can.
      placeholder: |
        1. Open …
        2. Click …
        3. See …
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: App version
      description: Shown at the bottom of the sidebar (e.g. v1.0.0).
    validations:
      required: false
  - type: input
    id: windows
    attributes:
      label: Windows version
      description: e.g. Windows 11 Home
    validations:
      required: false
